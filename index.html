<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dravonythra</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#00ff88;
font-family:Consolas,monospace;
overflow:hidden;
}

#terminal{
padding:40px;
width:100%;
height:100vh;
}

.en{
color:#ffffff;
font-size:23px;
margin-top:15px;
}

.ar{
color:#66ffb3;
font-size:18px;
margin-bottom:20px;
direction:rtl;
}

.cursor{
display:inline-block;
width:8px;
background:#00ff88;
animation:blink .8s infinite;
}

@keyframes blink{
50%{
opacity:0;
}
}

</style>

</head>

<body>

<div id="terminal"></div>

<script>

const terminal=document.getElementById("terminal");

const lines=[

["Initializing...","جارٍ التهيئة..."],

["Establishing Secure Connection...","جارٍ إنشاء اتصال آمن..."],

["Identity Scan...","جارٍ فحص الهوية..."],

["WELCOME, ABDULRAHMAN.","مرحبًا يا عبدالرحمن."],

["This is not a normal website.","هذا ليس موقعًا عاديًا."],

["Everything starts now...","كل شيء يبدأ الآن..."]

];

let current=0;

async function sleep(ms){
return new Promise(r=>setTimeout(r,ms));
}

async function type(text,element){

for(let i=0;i<=text.length;i++){

element.innerHTML=text.substring(0,i)+"<span class='cursor'></span>";

await sleep(35);

}

element.innerHTML=text;

}

async function run(){

while(current<lines.length){

const en=document.createElement("div");
en.className="en";

terminal.appendChild(en);

await type(lines[current][0],en);

const ar=document.createElement("div");
ar.className="ar";

terminal.appendChild(ar);

await type(lines[current][1],ar);

await sleep(500);

current++;

}

}

run();

</script>

</body>
</html>
